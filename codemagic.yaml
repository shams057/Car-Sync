workflows:
  android-build:
    name: Build Android APK
    instance_type: mac_mini_m1
    environment:
      java: 17
    scripts:
      - name: Build Android APK
        script: |
          # If your files got pushed inside a CarMirror sub-folder, this moves into it
          if [ -d "CarMirror" ]; then cd CarMirror; fi
          
          # Build using Codemagic's global Gradle (bypasses the wrapper completely)
          gradle assembleDebug
    artifacts:
      - "**/*.apk"
